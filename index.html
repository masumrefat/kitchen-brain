<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Brain 🧠</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1923; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .spinner div { animation: pulse 1s infinite; }
    .spinner div:nth-child(2) { animation-delay: 0.3s; }
    .spinner div:nth-child(3) { animation-delay: 0.6s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const { useState, useRef } = React;

const CATEGORIES = {
  Dairy:      { icon: "🥛", color: "#E8F4FD", accent: "#2196F3" },
  Vegetables: { icon: "🥦", color: "#E8F5E9", accent: "#4CAF50" },
  Fruits:     { icon: "🍎", color: "#FFF3E0", accent: "#FF9800" },
  Meat:       { icon: "🥩", color: "#FCE4EC", accent: "#E91E63" },
  Bakery:     { icon: "🍞", color: "#FFF8E1", accent: "#FFC107" },
  Beverages:  { icon: "🧃", color: "#E3F2FD", accent: "#03A9F4" },
  Frozen:     { icon: "🧊", color: "#E8EAF6", accent: "#3F51B5" },
  Condiments: { icon: "🧴", color: "#F3E5F5", accent: "#9C27B0" },
  Snacks:     { icon: "🍿", color: "#FBE9E7", accent: "#FF5722" },
  Other:      { icon: "📦", color: "#ECEFF1", accent: "#607D8B" },
};

function getDays(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(d); exp.setHours(0,0,0,0);
  return Math.ceil((exp - today) / 86400000);
}

function getStatus(days) {
  if (days < 0)  return { label: "Expired",      color: "#FF1744", bg: "#FFE5EA" };
  if (days <= 2) return { label: `${days}d left`, color: "#FF6D00", bg: "#FFF3E0" };
  if (days <= 7) return { label: `${days}d left`, color: "#F9A825", bg: "#FFFDE7" };
  return           { label: `${days}d left`,      color: "#2E7D32", bg: "#E8F5E9" };
}

function today() { return new Date().toISOString().split('T')[0]; }
function addDays(n) { return new Date(Date.now() + n*86400000).toISOString().split('T')[0]; }

const DEMO = [
  { id:1, name:"Greek Yogurt",    quantity:"500g",   category:"Dairy",      expiryDate: addDays(2)  },
  { id:2, name:"Fresh Spinach",   quantity:"200g",   category:"Vegetables", expiryDate: addDays(3)  },
  { id:3, name:"Chicken Breast",  quantity:"600g",   category:"Meat",       expiryDate: addDays(1)  },
  { id:4, name:"Whole Milk",      quantity:"1L",     category:"Dairy",      expiryDate: addDays(10) },
  { id:5, name:"Sourdough Bread", quantity:"1 loaf", category:"Bakery",     expiryDate: addDays(4)  },
  { id:6, name:"Strawberries",    quantity:"300g",   category:"Fruits",     expiryDate: addDays(-1) },
];

async function analyzeImage(base64) {
  // Replace with your free Gemini API key from https://aistudio.google.com
  const API_KEY = "YOUR_GEMINI_API_KEY";
  
  if (API_KEY === "YOUR_GEMINI_API_KEY") {
    // Demo mode - returns random mock item
    await new Promise(r => setTimeout(r, 2000));
    const mocks = [
      { name:"Orange Juice",  quantity:"1L",   category:"Beverages",  expiryDate: addDays(7)  },
      { name:"Cheddar Cheese",quantity:"250g", category:"Dairy",      expiryDate: addDays(5)  },
      { name:"Eggs",          quantity:"x6",   category:"Other",      expiryDate: addDays(14) },
      { name:"Butter",        quantity:"200g", category:"Dairy",      expiryDate: addDays(20) },
      { name:"Tomatoes",      quantity:"4pcs", category:"Vegetables", expiryDate: addDays(4)  },
    ];
    return mocks[Math.floor(Math.random() * mocks.length)];
  }

  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{
        parts: [
          { inline_data: { mime_type: "image/jpeg", data: base64 } },
          { text: `Look at this food item and return ONLY a JSON object with these fields:
            - name: product name (string)
            - quantity: amount/weight shown on package (string)
            - category: one of [Dairy, Vegetables, Fruits, Meat, Bakery, Beverages, Frozen, Condiments, Snacks, Other]
            - expiryDate: expiry date in YYYY-MM-DD format (if not visible, estimate reasonably)
            Return ONLY the JSON, no markdown, no explanation.` }
        ]
      }]
    })
  });
  const data = await res.json();
  const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

function App() {
  const [items, setItems] = useState(DEMO);
  const [view, setView] = useState("dashboard");
  const [scanning, setScanning] = useState(false);
  const [scanned, setScanned] = useState(null);
  const [preview, setPreview] = useState(null);
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("All");
  const [toast, setToast] = useState(null);
  const fileRef = useRef();

  const expiring = items.filter(i => { const d=getDays(i.expiryDate); return d>=0&&d<=2; });
  const expired  = items.filter(i => getDays(i.expiryDate) < 0);

  function showToast(msg, color="#4CAF50") {
    setToast({ msg, color });
    setTimeout(() => setToast(null), 3000);
  }

  async function onPhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      setPreview(dataUrl);
      setScanning(true);
      setView("scan");
      try {
        const base64 = dataUrl.split(',')[1];
        const result = await analyzeImage(base64);
        setScanned(result);
      } catch(err) {
        showToast("Could not read image. Try again.", "#FF1744");
        setView("dashboard");
      } finally {
        setScanning(false);
      }
    };
    reader.readAsDataURL(file);
  }

  function addItem() {
    if (!scanned) return;
    setItems(prev => [{ id: Date.now(), ...scanned }, ...prev]);
    setScanned(null); setPreview(null);
    showToast("✅ Item added to your kitchen!");
    setView("inventory");
  }

  function removeItem(id) {
    setItems(prev => prev.filter(i => i.id !== id));
    showToast("🗑️ Item removed", "#607D8B");
  }

  const filtered = items.filter(i =>
    i.name.toLowerCase().includes(search.toLowerCase()) &&
    (cat === "All" || i.category === cat)
  );

  const S = {
    app: { fontFamily:"'DM Sans',sans-serif", minHeight:"100vh", background:"linear-gradient(135deg,#0f1923 0%,#1a2d1e 50%,#0f1923 100%)", color:"#f0f0f0", maxWidth:480, margin:"0 auto", position:"relative" },
    header: { padding:"24px 20px 16px", background:"rgba(255,255,255,0.03)", borderBottom:"1px solid rgba(255,255,255,0.06)" },
    logoWrap: { display:"flex", alignItems:"center", gap:10, marginBottom:4 },
    logoIcon: { width:36, height:36, background:"linear-gradient(135deg,#4CAF50,#81C784)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 },
    logoText: { fontSize:22, fontWeight:800, background:"linear-gradient(135deg,#81C784,#A5D6A7)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" },
    sub: { fontSize:12, color:"rgba(255,255,255,0.4)" },
    content: { padding:"16px 20px 100px" },
    statsRow: { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 },
    statCard: { background:"rgba(255,255,255,0.05)", borderRadius:14, padding:"14px 12px", textAlign:"center" },
    sectionTitle: { fontSize:13, fontWeight:600, color:"rgba(255,255,255,0.5)", textTransform:"uppercase", letterSpacing:1, marginBottom:12, marginTop:20 },
    scanBtn: { width:"100%", padding:18, background:"linear-gradient(135deg,#4CAF50,#2E7D32)", border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, boxShadow:"0 8px 24px rgba(76,175,80,0.3)", marginBottom:16 },
    ghostBtn: { width:"100%", padding:18, background:"rgba(255,255,255,0.08)", border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:16 },
    alertCard: { background:"rgba(255,109,0,0.1)", border:"1px solid rgba(255,109,0,0.3)", borderRadius:14, padding:16, marginBottom:10, display:"flex", alignItems:"center", gap:12 },
    itemCard: (accent) => ({ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderLeft:`3px solid ${accent}`, borderRadius:14, padding:"14px 16px", marginBottom:10, display:"flex", alignItems:"center", gap:12, animation:"fadeIn 0.3s ease" }),
    catIcon: (bg) => ({ width:42, height:42, background:bg, borderRadius:12, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }),
    badge: (color, bg) => ({ background:bg, color, fontSize:11, fontWeight:700, padding:"3px 8px", borderRadius:20, whiteSpace:"nowrap" }),
    nav: { position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"rgba(15,25,35,0.97)", backdropFilter:"blur(20px)", borderTop:"1px solid rgba(255,255,255,0.08)", display:"flex", padding:"8px 0 16px" },
    navBtn: (active) => ({ flex:1, background:"none", border:"none", color:active?"#4CAF50":"rgba(255,255,255,0.35)", fontSize:10, fontWeight:active?700:400, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4, padding:"8px 0" }),
    input: { width:"100%", padding:"12px 16px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, color:"#fff", fontSize:14, outline:"none", marginBottom:14, boxSizing:"border-box" },
    pill: (active) => ({ padding:"6px 14px", borderRadius:20, border:`1px solid ${active?"#4CAF50":"rgba(255,255,255,0.1)"}`, background:active?"rgba(76,175,80,0.2)":"transparent", color:active?"#4CAF50":"rgba(255,255,255,0.5)", fontSize:12, fontWeight:active?700:400, cursor:"pointer", whiteSpace:"nowrap" }),
    scanArea: { background:"rgba(255,255,255,0.04)", border:"2px dashed rgba(76,175,80,0.4)", borderRadius:20, padding:40, textAlign:"center", cursor:"pointer" },
    detailRow: { display:"flex", justifyContent:"space-between", marginBottom:8 },
    detailLabel: { color:"rgba(255,255,255,0.5)", fontSize:13 },
    detailVal: { fontWeight:600, fontSize:13 },
    toast: (color) => ({ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background:color, color:"#fff", padding:"12px 24px", borderRadius:30, fontSize:14, fontWeight:600, zIndex:1000, boxShadow:"0 8px 24px rgba(0,0,0,0.3)", whiteSpace:"nowrap" }),
    emptyState: { textAlign:"center", padding:60, color:"rgba(255,255,255,0.3)" },
  };

  const Dashboard = () => (
    <div>
      <div style={S.statsRow}>
        {[
          { num: expired.length,  label:"Expired",      color:"#FF1744" },
          { num: expiring.length, label:"Expiring Soon", color:"#FF6D00" },
          { num: items.length,    label:"Total Items",   color:"#2E7D32" },
        ].map(s => (
          <div key={s.label} style={S.statCard}>
            <div style={{ fontSize:28, fontWeight:800, color:s.color, lineHeight:1 }}>{s.num}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", marginTop:4 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <button style={S.scanBtn} onClick={() => fileRef.current.click()}>📸 Scan New Item</button>

      {[...expired, ...expiring].length > 0 && <>
        <div style={S.sectionTitle}>⚠️ Needs Attention</div>
        {[...expired, ...expiring].slice(0,4).map(item => {
          const days = getDays(item.expiryDate);
          const st = getStatus(days);
          const c = CATEGORIES[item.category] || CATEGORIES.Other;
          return (
            <div key={item.id} style={S.alertCard}>
              <div style={S.catIcon(c.color)}>{c.icon}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:600, fontSize:15 }}>{item.name}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginTop:2 }}>{item.quantity}</div>
              </div>
              <span style={S.badge(st.color, st.bg)}>{st.label}</span>
            </div>
          );
        })}
      </>}

      <div style={S.sectionTitle}>📦 All Items</div>
      {items.slice(0,5).map(item => {
        const days = getDays(item.expiryDate);
        const st = getStatus(days);
        const c = CATEGORIES[item.category] || CATEGORIES.Other;
        return (
          <div key={item.id} style={S.itemCard(c.accent)}>
            <div style={S.catIcon(c.color)}>{c.icon}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:600, fontSize:14 }}>{item.name}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>{item.category} · {item.quantity}</div>
            </div>
            <span style={S.badge(st.color, st.bg)}>{st.label}</span>
          </div>
        );
      })}
    </div>
  );

  const Scan = () => (
    <div>
      <div style={S.sectionTitle}>📸 Scan Item</div>
      {preview && <img src={preview} style={{ width:"100%", borderRadius:16, marginBottom:16, maxHeight:200, objectFit:"cover" }} />}
      {scanning && (
        <div style={{ textAlign:"center", padding:40 }}>
          <div style={{ fontSize:48, marginBottom:16 }}>🔍</div>
          <div style={{ fontSize:16, fontWeight:600, color:"#4CAF50" }}>AI is reading your item...</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginTop:8 }}>Detecting name, category & expiry date</div>
          <div className="spinner" style={{ marginTop:20, display:"flex", justifyContent:"center", gap:6 }}>
            {[0,1,2].map(i => <div key={i} style={{ width:8, height:8, borderRadius:"50%", background:"#4CAF50" }} />)}
          </div>
        </div>
      )}
      {scanned && !scanning && (
        <div>
          <div style={{ background:"rgba(76,175,80,0.1)", border:"1px solid rgba(76,175,80,0.3)", borderRadius:16, padding:20, marginBottom:16 }}>
            <div style={{ fontSize:13, color:"#4CAF50", fontWeight:600, marginBottom:12 }}>✅ AI detected:</div>
            {[["🏷️ Name", scanned.name], ["📦 Quantity", scanned.quantity], ["📁 Category", `${CATEGORIES[scanned.category]?.icon||"📦"} ${scanned.category}`], ["📅 Expires", scanned.expiryDate]].map(([l,v]) => (
              <div key={l} style={S.detailRow}>
                <span style={S.detailLabel}>{l}</span>
                <span style={S.detailVal}>{v}</span>
              </div>
            ))}
          </div>
          <button onClick={addItem} style={S.scanBtn}>✅ Add to Kitchen</button>
          <button onClick={() => { setScanned(null); setPreview(null); setView("dashboard"); }} style={S.ghostBtn}>❌ Cancel</button>
        </div>
      )}
      {!preview && !scanning && (
        <div style={S.scanArea} onClick={() => fileRef.current.click()}>
          <div style={{ fontSize:48, marginBottom:12 }}>📷</div>
          <div style={{ fontSize:16, fontWeight:600, marginBottom:8 }}>Take a Photo</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>AI will automatically detect the item, category and expiry date</div>
        </div>
      )}
    </div>
  );

  const Inventory = () => (
    <div>
      <input style={S.input} placeholder="🔍  Search your kitchen..." value={search} onChange={e => setSearch(e.target.value)} />
      <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:12, marginBottom:4 }}>
        {["All", ...Object.keys(CATEGORIES)].map(c => (
          <button key={c} style={S.pill(cat===c)} onClick={() => setCat(c)}>
            {c!=="All" ? CATEGORIES[c]?.icon+" " : ""}{c}
          </button>
        ))}
      </div>
      <div style={S.sectionTitle}>{filtered.length} items</div>
      {filtered.length === 0 && <div style={S.emptyState}><div style={{ fontSize:40 }}>🔍</div><div style={{ marginTop:12 }}>No items found</div></div>}
      {filtered.map(item => {
        const days = getDays(item.expiryDate);
        const st = getStatus(days);
        const c = CATEGORIES[item.category] || CATEGORIES.Other;
        return (
          <div key={item.id} style={S.itemCard(c.accent)}>
            <div style={S.catIcon(c.color)}>{c.icon}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:600, fontSize:14 }}>{item.name}</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>{item.quantity} · {item.expiryDate}</div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
              <span style={S.badge(st.color, st.bg)}>{st.label}</span>
              <button onClick={() => removeItem(item.id)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:14 }}>🗑️</button>
            </div>
          </div>
        );
      })}
    </div>
  );

  const Alerts = () => {
    const urgent = items.map(i => ({...i, days:getDays(i.expiryDate)})).filter(i => i.days<=7).sort((a,b)=>a.days-b.days);
    return (
      <div>
        <div style={S.sectionTitle}>🔔 Expiry Alerts</div>
        {urgent.length === 0
          ? <div style={S.emptyState}><div style={{ fontSize:48 }}>✅</div><div style={{ marginTop:12, fontSize:16, fontWeight:600 }}>All good!</div><div style={{ marginTop:8, fontSize:13 }}>No items expiring soon</div></div>
          : urgent.map(item => {
            const st = getStatus(item.days);
            const c = CATEGORIES[item.category] || CATEGORIES.Other;
            return (
              <div key={item.id} style={{ ...S.alertCard, borderColor:`${st.color}44`, background:`${st.bg}22` }}>
                <div style={S.catIcon(c.color)}>{c.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:600, fontSize:15 }}>{item.name}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginTop:2 }}>Expires: {item.expiryDate}</div>
                  {item.days<=2 && item.days>=0 && <div style={{ fontSize:12, color:"#FF9800", marginTop:4 }}>💡 Use soon to avoid waste!</div>}
                  {item.days<0 && <div style={{ fontSize:12, color:"#FF1744", marginTop:4 }}>❌ Please discard this item</div>}
                </div>
                <span style={S.badge(st.color, st.bg)}>{st.label}</span>
              </div>
            );
          })
        }
      </div>
    );
  };

  const alertCount = expiring.length + expired.length;

  return (
    <div style={S.app}>
      {toast && <div style={S.toast(toast.color)}>{toast.msg}</div>}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{ display:"none" }} onChange={onPhoto} />

      <div style={S.header}>
        <div style={S.logoWrap}>
          <div style={S.logoIcon}>🧠</div>
          <div style={S.logoText}>Kitchen Brain</div>
        </div>
        <div style={S.sub}>AI-powered kitchen manager · {items.length} items tracked</div>
      </div>

      <div style={S.content}>
        {view==="dashboard" && <Dashboard />}
        {view==="scan"      && <Scan />}
        {view==="inventory" && <Inventory />}
        {view==="alerts"    && <Alerts />}
      </div>

      <nav style={S.nav}>
        {[
          { id:"dashboard", icon:"🏠", label:"Home" },
          { id:"inventory", icon:"📦", label:"Inventory" },
          { id:"scan",      icon:"📸", label:"Scan" },
          { id:"alerts",    icon:"🔔", label:`Alerts${alertCount>0?" "+alertCount:""}` },
        ].map(tab => (
          <button key={tab.id} style={S.navBtn(view===tab.id)} onClick={() => setView(tab.id)}>
            <span style={{ fontSize:22 }}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
